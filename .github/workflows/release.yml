name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # for `gh release create`

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: xvfb-run -a npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Package extension
        run: npx @vscode/vsce package -o tryke-vscode.vsix
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        # Idempotent so failed Marketplace publishes can be retried by
        # re-running the job without deleting the release first.
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" tryke-vscode.vsix --clobber
          else
            gh release create "$TAG" tryke-vscode.vsix --generate-notes
          fi
      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath tryke-vscode.vsix -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      # Open VSX (VSCodium / Cursor / code-server): add repo secret OVSX_PAT
      # (from https://open-vsx.org/user-settings/tokens) and uncomment:
      # - name: Publish to Open VSX
      #   run: npx ovsx publish tryke-vscode.vsix -p "$OVSX_PAT"
      #   env:
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}
