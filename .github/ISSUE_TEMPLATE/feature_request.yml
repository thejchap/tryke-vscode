name: Feature request
description: Propose a new feature or an improvement to an existing one.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests that include a concrete proposal (not just a problem)
        are easier to move forward. Describing prior art from other VS Code
        test extensions (Python Test Explorer, vitest, jest) is very welcome.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, and why does it matter? Concrete scenarios help.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: API sketch, command, configuration key — whatever form fits.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other designs you thought about and why you discarded them.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which component does this touch? Pick the closest; maintainers will re-label if needed.
      options:
        - extension
        - discovery
        - runner
        - server-mode
        - watch
        - results
        - controller
        - config
        - unsure
    validations:
      required: true
