name: Documentation
description: Something in the README or on the Marketplace listing is wrong, missing, or confusing.
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page / location
      description: Path in this repo (e.g. README.md) or URL to the Marketplace listing.
      placeholder: "README.md"
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is wrong, missing, or confusing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change (optional)
      description: If you have wording or structure in mind, paste it here.
